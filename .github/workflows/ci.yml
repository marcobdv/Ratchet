name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Ratchet.sln

      - name: Build
        run: dotnet build Ratchet.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Ratchet.sln --no-build --configuration Release --logger "console;verbosity=normal"
